<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | AcadPortal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#eef2ff,#f8fafc);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family: system-ui;
}

.login-card{
width:420px;
border-radius:18px;
border:none;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
padding:35px;
background:white;
}

.logo{
width:55px;
height:55px;
background:linear-gradient(135deg,#4f7cff,#6a5cff);
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
margin:auto;
margin-bottom:15px;
}

.title{
text-align:center;
font-weight:600;
margin-bottom:3px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:25px;
font-size:14px;
}

.form-control{
border-radius:10px;
padding:10px;
}

.btn-login{
background:linear-gradient(135deg,#4f7cff,#6a5cff);
border:none;
border-radius:10px;
padding:10px;
font-weight:500;
}

.btn-login:hover{
opacity:0.9;
}

.demo-box{
margin-top:18px;
background:#f1f5f9;
padding:12px;
border-radius:10px;
font-size:13px;
color:#475569;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
🎓
</div>

<h4 class="title">AcadPortal</h4>
<div class="subtitle">
Centralized College Database System
</div>

<form method="POST">

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<button class="btn btn-login w-100">
Login
</button>

</form>

<div class="demo-box">

<b>Demo Accounts</b><br>

Admin → admin / admin123<br>
Faculty → faculty1 / faculty123<br>
Student → student1 / student123

</div>

</div>

</body>
</html>
